<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Student Registration | Premium Portal</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">
</head>
<body>
    <div class="container">
        <div class="form-card">
            <header>
                <h1>Student Registration</h1>
                <p>Join our academic community today</p>
            </header>
            <form id="registrationForm">
                <div class="input-group">
                    <label for="name">Full Name</label>
                    <input type="text" id="name" name="name" placeholder="John Doe" required>
                </div>
                <div class="input-group">
                    <label for="email">Email Address</label>
                    <input type="email" id="email" name="email" placeholder="john@example.com" required>
                </div>
                <div class="input-row">
                    <div class="input-group">
                        <label for="dob">Date of Birth</label>
                        <input type="date" id="dob" name="dob" required>
                    </div>
                    <div class="input-group">
                        <label for="department">Department</label>
                        <select id="department" name="department" required>
                            <option value="" disabled selected>Select Department</option>
                            <option value="Computer Science">Computer Science</option>
                            <option value="Information Technology">Information Technology</option>
                            <option value="Electronics">Electronics</option>
                            <option value="Mechanical">Mechanical</option>
                        </select>
                    </div>
                </div>
                <div class="input-group">
                    <label for="phone">Phone Number</label>
                    <input type="tel" id="phone" name="phone" placeholder="+1 (555) 000-0000" required>
                </div>
                <button type="submit" class="submit-btn" id="submitBtn">Register Now</button>
            </form>
            <div id="message" class="message"></div>
            
            <hr>
            
            <section class="record-section">
                <h2>Registered Students</h2>
                <button id="fetchStudents" class="secondary-btn">View Records</button>
                <div id="studentList" class="student-list"></div>
            </section>
        </div>
    </div>
    <script>
        const form = document.getElementById('registrationForm');
        const message = document.getElementById('message');
        const studentList = document.getElementById('studentList');

        form.onsubmit = async (e) => {
            e.preventDefault();
            const formData = new FormData(form);
            const data = Object.fromEntries(formData.entries());

            try {
                const response = await fetch('/register', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(data)
                });
                const result = await response.json();
                
                if (response.ok) {
                    message.textContent = 'Registration successful!';
                    message.className = 'message success';
                    form.reset();
                } else {
                    message.textContent = 'Error: ' + result.error;
                    message.className = 'message error';
                }
            } catch (err) {
                message.textContent = 'Server connection failed.';
                message.className = 'message error';
            }
        };

        document.getElementById('fetchStudents').onclick = async () => {
            try {
                const response = await fetch('/students');
                const students = await response.json();
                
                if (students.length === 0) {
                    studentList.innerHTML = '<p>No records found.</p>';
                    return;
                }

                let html = '<table><thead><tr><th>Name</th><th>Email</th><th>Dept</th><th>Phone</th></tr></thead><tbody>';
                students.forEach(s => {
                    html += `<tr><td>${s.name}</td><td>${s.email}</td><td>${s.department}</td><td>${s.phone}</td></tr>`;
                });
                html += '</tbody></table>';
                studentList.innerHTML = html;
            } catch (err) {
                studentList.textContent = 'Failed to load records.';
            }
        };
    </script>
</body>
</html>
